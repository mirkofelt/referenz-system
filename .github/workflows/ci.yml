name: CI

on:
  push:
  pull_request:

jobs:
  unit-tests:
    name: Unit Tests (Embedding Service)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: embedding-service/requirements.txt

      - name: Install dependencies
        run: pip install -r embedding-service/requirements.txt

      - name: Run tests
        run: pytest embedding-service/tests/ -v

  integration-tests:
    name: Integration Tests (Full Stack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env from example
        run: |
          cp .env.example .env
          sed -i 's/^SERVER_IP=.*/SERVER_IP=localhost/' .env
          sed -i 's/^POSTGRES_PASSWORD=.*/POSTGRES_PASSWORD=ci_password/' .env
          sed -i 's/^NC_JWT_SECRET=.*/NC_JWT_SECRET=ci_testing_jwt_secret_not_real_x/' .env
          sed -i 's/^N8N_PASSWORD=.*/N8N_PASSWORD=ci_password/' .env

      - name: Build embedding service
        run: docker compose build embeddings

      - name: Start all services
        run: docker compose up -d

      - name: Wait for embedding service
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8001/health > /dev/null 2>&1; then
              echo "Embedding service ready"; break
            fi
            [ $i -eq 30 ] && { echo "Timeout: embedding service not ready"; docker compose logs embeddings; exit 1; }
            echo "Waiting... ($i/30)"; sleep 5
          done

      - name: Wait for Qdrant
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:6333/healthz > /dev/null 2>&1; then
              echo "Qdrant ready"; break
            fi
            [ $i -eq 20 ] && { echo "Timeout: Qdrant not ready"; docker compose logs qdrant; exit 1; }
            echo "Waiting... ($i/20)"; sleep 3
          done

      - name: Wait for NocoDB
        run: |
          for i in $(seq 1 40); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080 2>/dev/null || echo "0")
            if [[ "$code" =~ ^(200|301|302)$ ]]; then
              echo "NocoDB ready (HTTP $code)"; break
            fi
            [ $i -eq 40 ] && { echo "Timeout: NocoDB not ready (last: $code)"; docker compose logs nocodb postgres; exit 1; }
            echo "Waiting... ($i/40, code=$code)"; sleep 5
          done

      - name: Wait for n8n
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:5678 2>/dev/null || echo "0")
            if [[ "$code" =~ ^(200|301|302|401)$ ]]; then
              echo "n8n ready (HTTP $code)"; break
            fi
            [ $i -eq 30 ] && { echo "Timeout: n8n not ready (last: $code)"; docker compose logs n8n; exit 1; }
            echo "Waiting... ($i/30, code=$code)"; sleep 5
          done

      - name: Initialize Qdrant collection
        run: |
          chmod +x init-qdrant.sh
          ./init-qdrant.sh

      - name: Run integration tests
        run: |
          chmod +x test_integration.sh
          CI=true SERVER_IP=localhost ./test_integration.sh

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --tail=100
